<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Comercial — Escalar BPO</title>
    <!-- Fonte Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-general: #f2f2f2;
            --surface: #ffffff;
            --text-primary: #1a2830;
            --text-secondary: #4a6070;
            --text-muted: #8a9ea8;
            --accent-cyan: #00c4bc;
            --border-cyan: rgba(0, 196, 188, 0.22);
            --shadow-cyan: rgba(0, 196, 188, 0.1);
            --dark-surface: #1a2830;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-general); 
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Nav & Footer */
        .nav { 
            background-color: var(--surface); 
            padding: 16px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 2px 10px var(--shadow-cyan);
            border-bottom: 1px solid var(--border-cyan);
        }

        .main { max-width: 960px; margin: 0 auto; padding: 40px 20px; }

        /* Logos */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-escalar { height: 50px; display: block; margin: 0 auto; }
        
        /* Buttons */
        .btn-primary {
            background-color: var(--accent-cyan);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            background: transparent;
            color: var(--accent-cyan);
            border: 1.5px solid var(--accent-cyan);
            padding: 9px 19px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        /* Cards & Surfaces */
        .card {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-cyan);
        }

        /* Investment Box - Dark Contrast */
        .investment-box {
            background-color: var(--dark-surface);
            color: #ffffff;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 40px 0;
        }
        .investment-box h2 { color: var(--accent-cyan); margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .investment-value { font-size: 48px; font-weight: 800; margin: 10px 0; }

        /* Strategic Partners */
        .partners-section { margin-top: 50px; text-align: center; }
        .partners-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .partners-grid { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            flex-wrap: wrap;
            padding: 20px;
        }
        .partner-logo { height: 30px; filter: grayscale(100%); opacity: 0.7; transition: all 0.3s; }
        .partner-logo:hover { filter: grayscale(0%); opacity: 1; }

        /* Admin Section */
        .admin-footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
        }
        .admin-link {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 10px;
            cursor: pointer;
        }
        .admin-link:hover { color: var(--accent-cyan); }
        
        /* Inputs */
        input, select, textarea {
            background-color: #ffffff;
            border: 1.5px solid var(--border-cyan);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            outline: none;
        }
        input:focus { border-color: var(--accent-cyan); }

        /* OnePage Specifics */
        .op-section { padding: 30px 0; border-bottom: 1px solid #eee; }
        .op-title { color: var(--accent-cyan); font-weight: 800; font-size: 18px; margin-bottom: 15px; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 10px; border: 1px solid var(--border-cyan); }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--accent-cyan); }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

    </style>
</head>
<body>

<div id="app"></div>

<script>
    // Configurações e Dados
    const CONFIG = {
        logoEscalar: 'https://novosite.grupoescalar.com/wp-content/uploads/2025/07/ESCALAR-NOVO-LOGO-28-scaled.webp',
        logoSalesforce: 'https://www.salesforce.com/news/wp-content/uploads/sites/3/2021/05/Salesforce-Logo.png',
        logoG4Scale: 'https://mir-s3-cdn-cf.behance.net/project_modules/fs/770267104128527.5f5bd7c3666f4.png'
    };

    let state = {
        view: 'dashboard', // dashboard, form, onepage
        proposals: JSON.parse(localStorage.getItem('escalar_proposals') || '[]'),
        editingId: null,
        isAdmin: false
    };

    function render() {
        const app = document.getElementById('app');
        if (state.view === 'dashboard') app.innerHTML = renderDashboard();
        else if (state.view === 'form') app.innerHTML = renderForm();
        else if (state.view === 'onepage') app.innerHTML = renderOnePage();
    }

    function renderDashboard() {
        const cards = state.proposals.map(p => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h3 style="color:var(--text-primary)">${p.empresa || 'Nova Proposta'}</h3>
                        <p style="color:var(--text-secondary); font-size:12px;">${p.segmento || 'Sem segmento'}</p>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-secondary" onclick="viewProposal('${p.id}')">Ver OnePage</button>
                        <button class="btn-primary" onclick="editProposal('${p.id}')">Editar</button>
                    </div>
                </div>
            </div>
        `).join('') || '<div class="card" style="text-align:center; color:var(--text-muted)">Nenhuma proposta criada.</div>';

        return `
            <div class="nav">
                <img src="${CONFIG.logoEscalar}" alt="Escalar" style="height:30px;">
                <button class="btn-primary" onclick="newState()">+ Nova Proposta</button>
            </div>
            <div class="main">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-val">${state.proposals.length}</div><div class="stat-label">Total</div></div>
                    <div class="stat-card"><div class="stat-val">R$ 0</div><div class="stat-label">Pipeline</div></div>
                </div>
                ${cards}
                
                <div class="admin-footer">
                    <span class="admin-link" onclick="toggleAdmin()">Painel ADM</span>
                    ${state.isAdmin ? `
                        <span class="admin-link" style="color:red" onclick="clearAll()">Limpar Tudo</span>
                    ` : ''}
                </div>
            </div>
        `;
    }

    function renderOnePage() {
        const p = state.proposals.find(x => x.id === state.editingId);
        return `
            <div class="nav">
                <img src="${CONFIG.logoEscalar}" alt="Escalar" style="height:30px;">
                <button class="btn-secondary" onclick="state.view='dashboard'; render()">← Voltar</button>
            </div>
            <div class="main">
                <div class="logo-container">
                    <img src="${CONFIG.logoEscalar}" class="logo-escalar" alt="Escalar Logo">
                </div>
                
                <div class="card">
                    <h1 style="font-weight:800; color:var(--text-primary); text-align:center; margin-bottom:10px;">PROPOSTA COMERCIAL</h1>
                    <p style="text-align:center; color:var(--text-secondary)">Preparada para: <strong>${p.empresa}</strong></p>
                </div>

                <div class="op-section">
                    <h2 class="op-title">DIAGNÓSTICO E CONTEXTO</h2>
                    <p style="color:var(--text-secondary)">Segmento: ${p.segmento}</p>
                    <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; border-left:4px solid var(--accent-cyan)">
                        ${p.objetivo || 'Objetivos comerciais alinhados para expansão de mercado e geração de leads qualificados.'}
                    </div>
                </div>

                <div class="investment-box">
                    <h2>INVESTIMENTO MENSAL</h2>
                    <div class="investment-value">${p.valor || 'R$ 0.000,00'}</div>
                    <p style="font-size:12px; opacity:0.6;">Condições comerciais válidas por 15 dias</p>
                </div>

                <div class="partners-section">
                    <div class="partners-title">Parceiros Estratégicos</div>
                    <div class="partners-grid">
                        <img src="${CONFIG.logoSalesforce}" class="partner-logo" alt="Salesforce">
                        <img src="${CONFIG.logoG4Scale}" class="partner-logo" alt="G4 Scale">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Pipedrive_logo.svg/2560px-Pipedrive_logo.svg.png" class="partner-logo" alt="Pipedrive" style="height:20px;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/HubSpot_Logo.svg/2560px-HubSpot_Logo.svg.png" class="partner-logo" alt="HubSpot" style="height:20px;">
                    </div>
                </div>

                <div class="admin-footer">
                    <span class="admin-link" onclick="state.view='dashboard'; render()">Dashboard</span>
                    ${state.isAdmin ? `<span class="admin-link" style="color:red" onclick="deleteProposal('${p.id}')">Excluir Proposta</span>` : ''}
                </div>
            </div>
        `;
    }

    function renderForm() {
        const p = state.proposals.find(x => x.id === state.editingId) || {};
        return `
            <div class="nav">
                <img src="${CONFIG.logoEscalar}" alt="Escalar" style="height:30px;">
                <button class="btn-secondary" onclick="state.view='dashboard'; render()">Cancelar</button>
            </div>
            <div class="main">
                <div class="card">
                    <h2 style="margin-bottom:20px; color:var(--text-primary)">Dados da Proposta</h2>
                    <div style="margin-bottom:15px">
                        <label style="font-size:11px; font-weight:700; color:var(--text-muted)">NOME DA EMPRESA</label>
                        <input type="text" id="f-empresa" value="${p.empresa || ''}" placeholder="Ex: Tech Solutions">
                    </div>
                    <div style="margin-bottom:15px">
                        <label style="font-size:11px; font-weight:700; color:var(--text-muted)">SEGMENTO</label>
                        <select id="f-segmento">
                            <option value="Tecnologia" ${p.segmento === 'Tecnologia' ? 'selected' : ''}>Tecnologia & SaaS</option>
                            <option value="Serviços" ${p.segmento === 'Serviços' ? 'selected' : ''}>Serviços B2B</option>
                            <option value="Indústria" ${p.segmento === 'Indústria' ? 'selected' : ''}>Indústria</option>
                        </select>
                    </div>
                    <div style="margin-bottom:15px">
                        <label style="font-size:11px; font-weight:700; color:var(--text-muted)">VALOR INVESTIMENTO</label>
                        <input type="text" id="f-valor" value="${p.valor || ''}" placeholder="R$ 6.500,00">
                    </div>
                    <div style="margin-bottom:15px">
                        <label style="font-size:11px; font-weight:700; color:var(--text-muted)">OBJETIVO PRINCIPAL</label>
                        <textarea id="f-objetivo" rows="3">${p.objetivo || ''}</textarea>
                    </div>
                    <button class="btn-primary" style="width:100%" onclick="saveProposal()">Salvar Proposta</button>
                </div>
            </div>
        `;
    }

    // Ações
    function newState() {
        state.editingId = 'p_' + Date.now();
        state.view = 'form';
        render();
    }

    function editProposal(id) {
        state.editingId = id;
        state.view = 'form';
        render();
    }

    function viewProposal(id) {
        state.editingId = id;
        state.view = 'onepage';
        render();
    }

    function saveProposal() {
        const p = {
            id: state.editingId,
            empresa: document.getElementById('f-empresa').value,
            segmento: document.getElementById('f-segmento').value,
            valor: document.getElementById('f-valor').value,
            objetivo: document.getElementById('f-objetivo').value
        };
        const idx = state.proposals.findIndex(x => x.id === p.id);
        if (idx > -1) state.proposals[idx] = p;
        else state.proposals.push(p);
        
        localStorage.setItem('escalar_proposals', JSON.stringify(state.proposals));
        state.view = 'dashboard';
        render();
    }

    function deleteProposal(id) {
        if(confirm('Excluir esta proposta?')) {
            state.proposals = state.proposals.filter(x => x.id !== id);
            localStorage.setItem('escalar_proposals', JSON.stringify(state.proposals));
            state.view = 'dashboard';
            render();
        }
    }

    function toggleAdmin() {
        state.isAdmin = !state.isAdmin;
        render();
    }

    function clearAll() {
        if(confirm('LIMPAR TODOS OS DADOS?')) {
            state.proposals = [];
            localStorage.removeItem('escalar_proposals');
            render();
        }
    }

    // Inicialização
    render();
</script>

</body>
</html>
