<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta Comercial — Escalar BPO</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
<style>
/* ── DESIGN SYSTEM: PDF Dark Theme ────────────────────────── */
:root{
  --bg:        #f2f2f2;
  --bg2:       #ffffff;
  --bg3:       #ebebeb;
  --bg4:       #e4e4e4;
  --surface:   #ffffff;
  --surface2:  #f7f7f7;
  --border:    rgba(0,196,188,.22);
  --border2:   rgba(0,0,0,.08);
  --cyan:      #00c4bc;
  --cyan2:     #00a89f;
  --cyan-dim:  rgba(0,196,188,.12);
  --cyan-glow: rgba(0,196,188,.07);
  --amber:     #e6a800;
  --amber-dim: rgba(230,168,0,.1);
  --green:     #2db36e;
  --red:       #d94040;
  --text:      #1a2830;
  --text2:     #4a6070;
  --text3:     #8a9ea8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Montserrat,sans-serif;background:var(--bg);color:var(--text);}

/* ── NAV ── */
.nav{background:#ffffff;border-bottom:2px solid var(--cyan);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,196,188,.15);}
.nlogo{font-size:15px;font-weight:700;color:#1a2830;letter-spacing:.06em;}.nlogo span{color:var(--cyan);}
.nsub{font-family:Montserrat,sans-serif;font-size:10px;color:var(--text3);font-style:italic;margin-top:1px;}

/* ── BUTTONS ── */
.nbtn{background:var(--cyan);color:#ffffff;border:none;border-radius:5px;padding:8px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:Montserrat,sans-serif;transition:background .15s;}
.nbtn:hover{background:var(--cyan2);}
.gbtn{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:5px;padding:7px 15px;font-weight:600;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif;transition:all .15s;}
.gbtn:hover{background:var(--cyan-dim);}
.dbtn{background:transparent;color:var(--red);border:1.5px solid rgba(224,85,85,.3);border-radius:5px;padding:7px 12px;font-weight:600;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif;}
.sbtn{background:transparent;color:var(--text2);border:1.5px solid rgba(0,0,0,.15);border-radius:5px;padding:7px 13px;font-weight:600;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif;transition:all .15s;}
.sbtn:hover{border-color:var(--cyan);color:var(--cyan);}

/* ── LAYOUT ── */
.main{max-width:960px;margin:0 auto;padding:28px 22px 60px;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.stat{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:14px 16px;}
.sv{font-family:Montserrat,sans-serif;font-size:28px;font-weight:700;color:var(--cyan);}
.sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:3px;}

/* ── PIPELINE ── */
.pipe{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:15px 18px;margin-bottom:18px;}
.pipe-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.pipe-row{display:flex;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;}
.ps{flex:1;padding:12px 14px;border-right:1.5px solid var(--border);text-align:center;}
.ps:last-child{border-right:none;}
.ps-l{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.ps-v{font-family:Montserrat,sans-serif;font-size:22px;font-weight:700;}
.ps-s{font-size:12px;font-weight:600;margin-top:2px;}

/* ── PROPOSAL CARDS ── */
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:14px 18px;margin-bottom:10px;transition:border-color .15s;}
.pcard:hover{border-color:rgba(0,196,188,.3);}
.pcard-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.pav{width:42px;height:42px;border-radius:7px;background:var(--cyan-dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--cyan);flex-shrink:0;font-family:Montserrat,sans-serif;}
.pinfo{flex:1;min-width:160px;}
.pname{font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px;}
.pmeta{font-size:11px;color:var(--text3);}
.pact{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;display:inline-block;border:1.5px solid;}
.br{color:var(--text3);border-color:var(--border2);background:rgba(255,255,255,.04);}
.be{color:var(--cyan2);border-color:rgba(0,196,188,.3);background:rgba(0,196,188,.08);}
.ba{color:var(--green);border-color:rgba(62,207,122,.3);background:rgba(62,207,122,.07);}
.bp{color:var(--red);border-color:rgba(224,85,85,.3);background:rgba(224,85,85,.07);}
.ssel{background:#ffffff;border:1.5px solid rgba(0,196,188,.2);color:var(--text2);font-size:11px;padding:5px 8px;border-radius:5px;font-family:Montserrat,sans-serif;cursor:pointer;}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;}

/* ── FUP ── */
.fup-section{margin-top:12px;border-top:1.5px solid var(--border);padding-top:10px;}
.fup-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.fup-row{display:flex;gap:6px;flex-wrap:wrap;}
.fup-box{flex:1;min-width:90px;border:1.5px solid rgba(0,196,188,.18);border-radius:6px;padding:9px 10px;background:#f7f7f7;position:relative;transition:border .15s;}
.fup-box.done{border-color:var(--cyan);background:var(--cyan-glow);}
.fup-box.pend{border-color:var(--amber);background:var(--amber-dim);}
.fup-num{font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.fup-dt{width:100%;border:none;background:transparent;font-size:11px;color:var(--text2);font-family:Montserrat,sans-serif;margin-bottom:3px;outline:none;
.fup-nt{width:100%;border:none;background:transparent;font-size:10px;color:var(--text3);font-family:Montserrat,sans-serif;resize:none;outline:none;line-height:1.4;min-height:26px;}
.fup-dot{width:7px;height:7px;border-radius:50%;position:absolute;top:9px;right:9px;background:var(--border2);}
.fup-dot.done{background:var(--cyan);}
.fup-dot.pend{background:var(--amber);}
.fup-sts{display:flex;gap:8px;margin-top:5px;}
.fup-st{font-size:10px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:3px;}

/* ── QUALIFICAÇÃO ── */
.qual-tabs{display:flex;gap:8px;margin-bottom:12px;}
.qual-tab{flex:1;padding:10px 8px;border-radius:6px;border:1.5px solid rgba(0,196,188,.18);background:#f2f2f2;cursor:pointer;text-align:center;transition:all .15s;}
.qual-tab.on{background:#ffffff;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,196,188,.15);}
.qual-tab-t{font-size:12px;font-weight:700;color:var(--text2);}
.qual-tab.on .qual-tab-t{color:var(--cyan);}
.qual-tab-s{font-size:10px;color:var(--text3);margin-top:2px;}
.qual-tab.on .qual-tab-s{color:rgba(0,196,188,.55);}
.qual-desc{background:var(--cyan-glow);border-left:3px solid var(--cyan);border-radius:0 5px 5px 0;padding:12px 16px;font-size:13px;color:var(--text);line-height:1.7;font-weight:500;margin-bottom:14px;}

/* ── FORM ── */
.fcard{background:#ffffff;border:1.5px solid rgba(0,196,188,.2);border-radius:8px;overflow:hidden;box-shadow:0 2px 16px rgba(0,196,188,.08);}
.prog{height:4px;background:rgba(0,196,188,.15);}
.pf{height:100%;background:var(--cyan);transition:width .4s;}
.fbody{padding:26px 28px;}
.sey{font-size:10px;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px;}
.stt{font-family:Montserrat,sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:3px;}
.ssb{font-size:12px;color:var(--text3);margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:block;margin-bottom:5px;}
input,select,textarea{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);font-size:13px;padding:9px 12px;border-radius:5px;outline:none;width:100%;font-family:Montserrat,sans-serif;transition:border .18s;
input:focus,select:focus,textarea:focus{border-color:var(--cyan);background:var(--bg4);}
select option{background:var(--bg2);color:var(--text);}
.fld{margin-bottom:13px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px;}
.chip{padding:6px 13px;border-radius:5px;font-size:12px;font-weight:600;border:1.5px solid rgba(0,196,188,.18);background:#f2f2f2;color:var(--text2);cursor:pointer;font-family:Montserrat,sans-serif;transition:all .15s;}
.chip.on{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);}
.obj-chip{padding:6px 12px;border-radius:5px;font-size:12px;font-weight:500;border:1.5px solid rgba(0,196,188,.18);background:#f2f2f2;color:var(--text2);cursor:pointer;display:inline-block;margin:3px 3px 0 0;transition:all .15s;font-family:Montserrat,sans-serif;}
.obj-chip.on{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);font-weight:600;}
.cin{background:#f7f7f7;border:1.5px solid rgba(0,196,188,.18);border-radius:6px;padding:14px 16px;margin-bottom:13px;}
.mbt{flex:1;padding:15px 12px;border-radius:6px;cursor:pointer;text-align:center;border:1.5px solid rgba(0,196,188,.18);background:#f2f2f2;color:var(--text2);font-weight:700;font-size:13px;font-family:Montserrat,sans-serif;transition:all .18s;}
.mbt.on{border-color:var(--cyan);border-width:2px;background:var(--cyan-dim);color:var(--cyan);}
.fnav{display:flex;justify-content:space-between;margin-top:22px;padding-top:18px;border-top:1.5px solid var(--border);}

/* ── ONEPAGE ── */
.op{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.ops{padding:22px 42px;border-bottom:1px solid var(--border);}
.ops:last-child{border-bottom:none;}
.opsa{background:#f7f7f7;}
.opsh{display:flex;align-items:center;gap:10px;margin-bottom:15px;}
.opsn{font-size:10px;font-weight:700;color:var(--cyan);letter-spacing:.14em;min-width:22px;}
.opsl{flex:1;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);}
.opst{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;}
.res{font-family:Montserrat,sans-serif;font-size:15px;line-height:1.8;color:var(--text);border-left:3px solid var(--cyan);padding:13px 18px;background:var(--cyan-glow);border-radius:0 5px 5px 0;font-weight:500;}
.ctx-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px;}
.ctx-i{padding:10px 13px;background:#f2f2f2;border-radius:5px;border-left:2px solid var(--cyan);}
.ctx-k{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;font-weight:600;}
.ctx-v{font-size:13px;font-weight:600;color:var(--text);}
.op-tag{font-size:11px;background:var(--cyan-glow);border:1.5px solid rgba(0,196,188,.2);border-radius:3px;padding:3px 9px;color:var(--text);display:inline-block;margin:2px;font-weight:500;}
.ok{display:flex;gap:10px;align-items:flex-start;padding:9px 13px;background:rgba(0,196,188,.06);border:1.5px solid rgba(0,196,188,.2);border-radius:5px;margin-bottom:5px;font-size:13px;color:var(--text);line-height:1.6;}
.nok{display:flex;gap:10px;align-items:flex-start;padding:9px 13px;background:rgba(245,183,49,.06);border:1.5px solid rgba(245,183,49,.2);border-radius:5px;margin-bottom:5px;font-size:13px;color:var(--text);line-height:1.6;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.rc{background:#f7f7f7;border-radius:5px;padding:13px 15px;border:1.5px solid rgba(0,196,188,.18);border-top:2.5px solid var(--cyan);}
.rc-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.rc-d{font-size:12px;color:var(--text2);line-height:1.6;}

/* ── TIME CARDS ── */
.tcg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.tc{border-radius:6px;padding:11px 7px;text-align:center;border:1.5px solid rgba(0,196,188,.18);background:#f2f2f2;}
.tc.hi{background:var(--cyan);border-color:var(--cyan);}
.tc-a{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--border2);}
.tc.hi .tc-a{background:rgba(0,0,0,.2);}
.tc-r{font-size:10px;font-weight:600;color:var(--text2);line-height:1.4;}
.tc.hi .tc-r{color:#0d1b2a;}
.tc-sub{font-size:9px;color:rgba(13,27,42,.7);margin-top:2px;}

/* ── TABLE ── */
.ot{width:100%;border-collapse:collapse;font-size:12px;}
.ot th{padding:8px 11px;text-align:left;background:#f2f2f2;color:var(--text3);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border);}
.ot td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text2);}
.ot .hi{color:var(--cyan);font-weight:700;}
.ot .bold-row td{font-weight:700;color:var(--text);background:#f2f2f2;}
.conv-pct{font-size:10px;color:var(--text3);font-weight:400;margin-left:4px;}
.tnote{font-family:Montserrat,sans-serif;font-size:14px;color:var(--text);margin-top:13px;line-height:1.8;border-left:3px solid var(--cyan);padding:10px 16px;background:var(--cyan-glow);font-weight:500;}

/* ── ESF BLOCK ── */
.esf{border:1.5px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:16px;}
.esf-header{background:#f2f2f2;padding:12px 16px;text-align:center;border-bottom:1.5px solid rgba(0,196,188,.18);}
.esf-header-t{font-size:10px;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:.14em;margin-bottom:3px;}
.esf-header-s{font-family:Montserrat,sans-serif;font-size:13px;color:var(--text2);font-style:normal;font-weight:600;}
.esf-body{display:grid;grid-template-columns:1fr 1.5px 1fr 1.5px 1fr;}
.esf-div{background:var(--border);}
.esf-item{padding:18px 12px;text-align:center;}
.esf-v{font-family:Montserrat,sans-serif;font-size:30px;font-weight:700;color:var(--cyan);line-height:1;}
.esf-l{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}
.esf-s{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── INVESTMENT BOX ── */
.ib{background:#1a2830;border-radius:8px;padding:36px 40px;text-align:center;border:2px solid rgba(0,196,188,.3);position:relative;}
.ib-val{font-family:Montserrat,sans-serif;font-size:52px;font-weight:700;color:var(--cyan);line-height:1;margin:8px 0;letter-spacing:-.02em;}
.ib-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;}
.ib-sub{font-size:12px;color:var(--text3);margin-top:10px;}
.ib-validity{position:absolute;top:20px;right:24px;text-align:right;}
.ib-validity-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.ib-validity-v{font-family:Montserrat,sans-serif;font-size:14px;font-weight:600;color:var(--text2);}

/* ── CONDITIONS GRID ── */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.ci2{padding:8px 0;border-bottom:1px solid var(--border);}
.ci2:nth-child(odd){padding-right:18px;border-right:1px solid var(--border);}
.ci2:nth-child(even){padding-left:18px;}
.ck2{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;font-weight:600;}
.cv2{font-size:12px;font-weight:600;color:var(--text);}

/* ── TAGS ── */
.ct{font-size:11px;background:var(--bg4);border:1.5px solid var(--border);border-radius:3px;padding:4px 9px;color:var(--text2);font-weight:500;display:inline-block;margin:2px;}
.ct-ativo{font-size:11px;background:var(--bg2);border:1.5px solid var(--cyan);border-radius:3px;padding:4px 9px;color:var(--cyan);font-weight:700;display:inline-block;margin:2px;}
.seg-title{font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}

/* ── NEXT STEPS ── */
.ni{display:flex;gap:14px;align-items:flex-start;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--border);}
.ni:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ni-n{font-family:Montserrat,sans-serif;font-size:20px;font-weight:700;color:var(--cyan);min-width:26px;line-height:1;}
.ni-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.ni-d{font-size:12px;color:var(--text2);line-height:1.6;}

/* ── PARTNERS ── */
.par{display:flex;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;}
.pa{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;border-right:1px solid var(--border);text-align:center;}
.pa:last-child{border-right:none;}
.pa-d{font-size:10px;color:var(--text2);margin-top:5px;font-weight:700;}

/* ── JOURNEY ── */
.jb{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 13px;background:#f2f2f2;border:1.5px solid rgba(0,196,188,.2);border-radius:5px;margin-top:13px;font-size:12px;font-weight:600;color:var(--cyan);width:fit-content;}
.jp{display:none;margin-top:12px;padding:15px;background:#f7f7f7;border:1.5px solid rgba(0,196,188,.18);border-radius:5px;}
.jp.open{display:block;}
.jw{display:flex;gap:3px;align-items:flex-start;}
.jc{flex:1;}
.ja{padding:11px 3px;color:var(--cyan);font-size:13px;flex-shrink:0;}
.jn{font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.jt{font-size:10px;color:var(--cyan);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.jl{font-size:11px;color:var(--text2);line-height:1.7;padding-left:11px;position:relative;margin-bottom:2px;}
.jl::before{content:'·';position:absolute;left:2px;color:var(--cyan);font-weight:700;}


/* ── ADM PANEL ── */
.adm-trigger{display:block;text-align:center;padding:28px 0 12px;cursor:pointer;font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;opacity:.45;transition:opacity .2s;user-select:none;}
.adm-trigger:hover{opacity:.7;}
.adm-panel{display:none;max-width:600px;margin:0 auto 32px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.adm-panel.open{display:block;}
.adm-head{background:#f2f2f2;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,196,188,.2);}
.adm-head-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
.adm-body{padding:14px 16px;}
.adm-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.adm-row:last-child{border-bottom:none;}
.adm-name{flex:1;font-weight:600;color:var(--text);font-size:12px;}
.adm-co{font-size:11px;color:var(--text3);}
.adm-st{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;text-transform:uppercase;}

function calcDiag(d){
  const f=[],ch=[],cr=d.crescimento||[];
  if(cr.includes('Indicação'))f.push('Forte capital relacional — clientes satisfeitos atuam como promotores da marca');
  if(cr.includes('Inbound'))f.push('Presença digital ativa gerando demanda orgânica qualificada');
  if(cr.includes('Outbound'))f.push('Iniciativa de prospecção ativa com perfil hunter consolidado');
  if(d.icp==='muito_claro')f.push('ICP bem definido — direcionamento estratégico claro para prospecção');
  if(d.ciclo==='menos30'||d.ciclo==='30_60')f.push('Ciclo comercial favorável para aprendizado acelerado');
  if(d.previsibilidade==='baixa'||d.previsibilidade==='dependente')ch.push('Baixa previsibilidade de pipeline — crescimento dependente de variáveis externas');
  if(cr.includes('Indicação')&&!cr.includes('Outbound'))ch.push('Dependência do crescimento orgânico limita velocidade de escala');
  if(d.icp==='inexistente'||d.icp==='parcial')ch.push('ICP indefinido compromete eficiência da prospecção e aumenta o CAC');
  if(!d.crm||d.crm==='nenhum')ch.push('Ausência de CRM dificulta rastreabilidade e previsibilidade do pipeline');
  if(d.ciclo==='mais120')ch.push('Ciclo longo exige estrutura robusta de nutrição e gestão de médio prazo');
  const resumo=`${d.empresa||'A empresa'} apresenta ${f.length} ponto(s) de força e ${ch.length} desafio(s) crítico(s). ${d.previsibilidade==='muito_previsivel'?'A operação demonstra maturidade comercial relevante, com clara capacidade de expansão.':'A operação ainda depende de fatores relacionais para crescer — existe janela estratégica para construção de motor de demanda previsível e escalável com a Escalar.'}`;
  return{f,ch,resumo};
}

function setQual(pid,tipo){
  const p=proposals.find(x=>x.id==pid);if(!p)return;
  // Só muda o texto explicativo — tabela fica sempre com valores padrão
  const tabs=document.querySelectorAll('#qtabs-'+pid+' .qual-tab');
  const tipos=['aberta','padrao','restrita'];
  tabs.forEach((t,i)=>{t.className='qual-tab'+(tipos[i]===tipo?' on':'');});
  const desc=document.getElementById('qdesc-'+pid);
  if(desc)desc.textContent=QUAL_DESC[tipo];
}

function saveFup(pid,n,key,val){
  const p=proposals.find(x=>x.id===pid||x.id==pid);if(!p)return;
  if(!p.fups)p.fups={};
  if(!p.fups[n])p.fups[n]={};
  p.fups[n][key]=val;
  sv();
  const box=document.getElementById('fup-'+pid+'-'+n);
  if(!box)return;
  const fup=p.fups[n];
  const st=fup.status;
  box.className='fup-box'+(st==='done'?' done':st==='pend'?' pend':'');
  const dot=box.querySelector('.fup-dot');
  if(dot)dot.className='fup-dot'+(st==='done'?' done':st==='pend'?' pend':'');
}

function chip(l,v,key,multi){const on=multi?(F[key]||[]).includes(v):F[key]===v;const cl=multi?`tgl('${key}','${v}')`:`setF('${key}','${v}')`;return`<span class="chip${on?' on':''}" onclick="${cl}">${l}</span>`;}
function fld(lbl,key,ph){return`<div class="fld"><label class="lbl">${lbl}</label><input value="${F[key]||''}" placeholder="${ph||''}" oninput="F['${key}']=this.value"></div>`;}
function seld(lbl,key,opts){return`<div class="fld"><label class="lbl">${lbl}</label><select onchange="F['${key}']=this.value"><option value="">Selecione...</option>${opts.map(([v,l])=>`<option value="${v}"${F[key]===v?' selected':''}>${l}</option>`).join('')}</select></div>`;}

function rForm(){
  const ded=F.modelo==='dedicado';
  const d=step>=3?calcDiag(F):{f:[],ch:[],resumo:''};
  let body='';
  if(step===1){body=`<div class="sey">Bloco 01</div><div class="stt">Identificação do cliente</div><div class="ssb">Dados básicos para contextualizar a proposta</div>
    <div class="g2">${fld('Empresa','empresa','Nome da empresa')}${fld('Website','website','https://empresa.com.br')}</div>
    <div class="g2">${seld('Segmento','segmento',SEGS.map(s=>[s,s]))}${fld('Contato','contato','Nome do decisor')}</div>
    <div class="g2">${fld('Cargo','cargo','CEO, Diretor...')}${seld('Região','regiao',[['local','Local'],['estadual','Estadual'],['sul_sudeste','Sul+Sudeste'],['sudeste','Sudeste'],['brasil','Brasil'],['america_latina','América Latina'],['global','Global']])}</div>
    <div class="g2">${seld('Faturamento anual','receita',[['abaixo_1','< R$ 1MM'],['1_5','R$ 1-5MM'],['5_20','R$ 5-20MM'],['acima_20','> R$ 20MM']])}${seld('Nº de vendedores','vendedores',[['nenhum','Nenhum'],['1_2','1-2'],['3_5','3-5'],['6_10','6-10'],['acima_10','10+']])}</div>
    ${seld('CRM atual','crm',[['nenhum','Sem CRM'],['pipedrive','Pipedrive'],['hubspot','HubSpot'],['salesforce','Salesforce'],['rdstation','RD Station'],['planilha','Planilhas'],['outros','Outros']])}${seld('Vendedor responsável','vendedor',[['andre','André Albergaria'],['marco','Marco Tulio'],['rhavi','Rhavi']])}`;
  }else if(step===2){
    const objChips=OBJ_OPTS.map(o=>{
      const on=(F.objetivos||[]).includes(o);
      return '<span class="obj-chip'+(on?' on':'')+'" onclick="tglObj(this,\''+o.replace(/'/g,'\\\'')+'\')">' +o+'</span>';
    }).join('');
    body=`<div class="sey">Bloco 02</div><div class="stt">Contexto comercial</div><div class="ssb">Como a empresa cresce e onde quer chegar</div>
    <div class="cin"><label class="lbl">Como cresce hoje?</label><div class="chips">${['Indicação','Outbound','Inbound','Parceiros','Networking','Tráfego Pago','Outro'].map(v=>chip(v,v,'crescimento',true)).join('')}</div></div>
    <div class="cin"><label class="lbl">Previsibilidade comercial</label><div class="chips">${[['Muito previsível','muito_previsivel'],['Moderada','moderada'],['Baixa','baixa'],['Dependente de relacionamento','dependente']].map(([l,v])=>chip(l,v,'previsibilidade',false)).join('')}</div></div>

    </div>

function addDays(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0]; // YYYY-MM-DD para input[type=date]
}

function autoFupDates(p){
  // Só preenche se o FUP ainda não tem data definida
  const dias=[2,5,7,15,20];
  if(!p.fups)p.fups={};
  dias.forEach((d,i)=>{
    const n=i+1;
    if(!p.fups[n])p.fups[n]={};
    if(!p.fups[n].date){
      p.fups[n].date=addDays(d);
      p.fups[n].status=p.fups[n].status||'pend';
    }
  });
}

function setSt(id,s){
  const p=proposals.find(x=>x.id===id);
  if(p){
    p.status=s;
    // Ao marcar como enviada, sugerir datas de FUP automaticamente
    if(s==='enviada') autoFupDates(p);
    sv();syncToSheets(p);re();
  }
}
function dupP(id){const p=proposals.find(x=>x.id===id);if(!p)return;const n=JSON.parse(JSON.stringify(p));n.id=Date.now();n.ver=(p.ver||1)+1;n.status='rascunho';n.created=fmtD();n.fups={};proposals.unshift(n);sv();re();}
function delP(id){if(!confirm('Excluir?'))return;deleteFromSheets(id);proposals=proposals.filter(x=>x.id!==id);sv();re();}

function sendGmail(id){
  const p=proposals.find(x=>x.id===id);if(!p)return;
  const vd=VENDEDORES[p.vendedor||'andre']||VENDEDORES['andre'];
  const propNum=p.num?'#'+String(p.num).padStart(3,'0')+(p.ver&&p.ver>1?' v'+p.ver:''):'';
  const to=p.contato?'':'';//deixar em branco para vendedor preencher
  const subject=encodeURIComponent(
    'Proposta Comercial Escalar BPO'+
    (p.empresa?' — '+p.empresa:'')+
    (propNum?' ('+propNum+')':'')
  );
  const val=new Date(Date.now()+30*24*3600*1000).toLocaleDateString('pt-BR');
  const body=encodeURIComponent(
    'Olá'+(p.contato?', '+p.contato:'')+',\n\n'+
    'Segue em anexo a proposta comercial da Escalar BPO'+
    (p.empresa?' para a '+p.empresa:'')+'.\n\n'+
    '📋 Resumo da proposta:\n'+
    '• Modelo: '+(p.modelo?((p.modelo==='dedicado'?'BDR Dedicado':'BDR Compartilhado')):'—')+'\n'+
    (p.valor?'• Investimento: '+p.valor+'/mês\n':'')+
    '• Válida até: '+val+'\n\n'+
    'Estou à disposição para esclarecer qualquer dúvida ou agendar uma conversa.\n\n'+
    'Att,\n'+vd.nome+'\n'+
    (vd.tel?vd.tel+'\n':'')+
    vd.email+'\n'+
    'grupoescalar.com.br'
  );
  const url='https://mail.google.com/mail/?view=cm&fs=1&to=&su='+subject+'&body='+body+'&from='+encodeURIComponent(vd.email);
  window.open(url,'_blank');
}


function gerarLink(id){
  const p=proposals.find(x=>x.id===id||x.id==id);
  if(!p){alert('Salve a proposta na planilha antes de gerar o link (clique em Enviar Tudo).');return;}
  // Sincronizar primeiro
  syncToSheets(p);
  // Gerar URL pública
  const url=SHEETS_URL+'?id='+id;
  // Copiar para clipboard
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      const btn=document.getElementById('link-btn-'+id);
      if(btn){
        btn.textContent='✓ Link copiado!';
        btn.classList.add('link-copied');
        setTimeout(function(){btn.textContent='🔗 Gerar Link';btn.classList.remove('link-copied');},3000);
      }
    });
  } else {
    // fallback
    const el=document.createElement('textarea');
    el.value=url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('Link copiado: '+url);
  }
}

function setF(k,v){F[k]=v;re();}
function tgl(k,v){if(!F[k])F[k]=[];if(F[k].includes(v))F[k]=F[k].filter(x=>x!==v);else F[k].push(v);re();}
function tglObj(el,v){if(!F.objetivos)F.objetivos=[];if(F.objetivos.includes(v)){F.objetivos=F.objetivos.filter(x=>x!==v);el.classList.remove('on');}else{F.objetivos.push(v);el.classList.add('on');}}
function nextS(){step++;re();}
function prevS(){step--;re();}
function saveG(){
  if(!Array.isArray(F.crescimento))F.crescimento=[];
  if(!Array.isArray(F.objetivos))F.objetivos=[];
  if(F.status==='enviada') autoFupDates(F);
  const idx=proposals.findIndex(p=>p.id===F.id);
  if(idx>=0)proposals[idx]={...F};else proposals.unshift({...F});
  sv();syncToSheets({...F});editId=F.id;view='onepage';re();
}

// ── ADM PANEL ──────────────────────────────────────────────────────────────
var admUnlocked=false;
const ADM_PASS='escalar2025';

function toggleAdm(){
  const panel=document.getElementById('adm-panel');
  if(!panel)return;
  if(!admUnlocked){
    const pw=prompt('Senha ADM:');
    if(pw!==ADM_PASS){if(pw!==null)alert('Senha incorreta.');return;}
    admUnlocked=true;
  }
  panel.classList.toggle('open');
  renderAdmList();
}

function renderAdmList(){
  const list=document.getElementById('adm-list');
  if(!list)return;
  if(!proposals.length){list.innerHTML='<div class="adm-empty">Nenhuma proposta cadastrada.</div>';return;}
  const SCOL={'rascunho':'color:#8a9ea8;background:rgba(0,0,0,.03)','enviada':'color:#00c4bc;background:rgba(0,196,188,.1)','aprovada':'color:#3ecf7a;background:rgba(62,207,122,.1)','perdida':'color:#e05555;background:rgba(224,85,85,.1)'};
  list.innerHTML=proposals.map(p=>`
    <div class="adm-row">
      <div class="adm-name">${p.empresa||'Sem nome'}</div>
      <div class="adm-co">${p.contato||'—'}</div>
      <span class="adm-st" style="${SCOL[p.status]||''}">${p.status||'rascunho'}</span>
      <button class="adm-btn" onclick="admEdit(${p.id})">✏ Editar</button>
      <button class="adm-btn del" onclick="admDel(${p.id})">✕ Excluir</button>
    </div>`).join('');
}

function admEdit(id){
  document.getElementById('adm-panel').classList.remove('open');
  goEdit(id);
}

function admDel(id){
  const p=proposals.find(x=>x.id===id);
  if(!p)return;
  if(!confirm('Excluir proposta de "'+( p.empresa||'Sem nome')+'"?\n\nEssa ação não pode ser desfeita.'))return;
  proposals=proposals.filter(x=>x.id!==id);
  save();
  renderAdmList();
  re();
}

function admClearAll(){
  if(!confirm('⚠️ ATENÇÃO\n\nExcluir TODAS as propostas?\n\nEssa ação não pode ser desfeita.'))return;
  proposals=[];
  save();
  document.getElementById('adm-panel').classList.remove('open');
  admUnlocked=false;
  re();
}
