<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta Comercial — Escalar BPO</title>
<!-- Fonte Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Reset e Base */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f2f2f2;color:#1a2830;line-height:1.5;}

/* Cores e Superfícies */
.nav{background:#ffffff;border-bottom:1px solid rgba(0,196,188,.22);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(0,196,188,.05);}
.nlogo{font-size:15px;font-weight:800;color:#1a2830;letter-spacing:.06em;}.nlogo span{color:#00c4bc;}
.nsub{font-size:10px;color:#8a9ea8;margin-top:1px;font-weight:500;}

/* Botões */
.nbtn{background:#00c4bc;color:#ffffff;border:none;border-radius:5px;padding:8px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Montserrat',sans-serif;}
.gbtn{background:transparent;color:#00c4bc;border:1.5px solid #00c4bc;border-radius:5px;padding:7px 15px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Montserrat',sans-serif;}
.dbtn{background:transparent;color:#dc2626;border:1.5px solid rgba(220,38,38,.3);border-radius:5px;padding:7px 12px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Montserrat',sans-serif;}
.sbtn{background:transparent;color:#4a6070;border:1.5px solid rgba(0,196,188,.22);border-radius:5px;padding:7px 13px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Montserrat',sans-serif;}

/* Main e Cards */
.main{max-width:960px;margin:0 auto;padding:28px 22px 60px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.stat{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);border-radius:7px;padding:14px 16px;}
.sv{font-size:28px;font-weight:800;color:#00c4bc;}
.sl{font-size:10px;color:#8a9ea8;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:3px;}

.pipe{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);border-radius:7px;padding:15px 18px;margin-bottom:18px;}
.pipe-t{font-size:10px;font-weight:800;color:#8a9ea8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.pipe-row{display:flex;border:1.5px solid rgba(0,196,188,.1);border-radius:6px;overflow:hidden;}
.ps{flex:1;padding:12px 14px;border-right:1.5px solid rgba(0,196,188,.1);text-align:center;}
.ps:last-child{border-right:none;}
.ps-l{font-size:10px;font-weight:700;color:#8a9ea8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.ps-v{font-size:22px;font-weight:800;}
.ps-s{font-size:12px;font-weight:600;margin-top:2px;}

.pcard{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);border-radius:7px;padding:14px 18px;margin-bottom:10px;transition:transform 0.2s;}
.pcard:hover{transform:translateY(-2px);}
.pname{font-weight:700;font-size:14px;color:#1a2830;margin-bottom:2px;}
.pmeta{font-size:11px;color:#4a6070;}

/* Form e Inputs */
.fcard{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);border-radius:8px;overflow:hidden;}
.pf{height:100%;background:#00c4bc;transition:width .4s;}
input,select,textarea{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);color:#1a2830;font-size:13px;padding:9px 12px;border-radius:5px;outline:none;width:100%;font-family:'Montserrat',sans-serif;transition:border .18s;}
input:focus,select:focus,textarea:focus{border-color:#00c4bc;box-shadow:0 0 0 3px rgba(0,196,188,.05);}
.lbl{font-size:10px;color:#4a6070;text-transform:uppercase;letter-spacing:.08em;font-weight:700;display:block;margin-bottom:5px;}

/* OnePage Específico */
.op{background:#ffffff;border:1.5px solid rgba(0,196,188,.22);border-radius:8px;overflow:hidden;}
.res{font-family:'Montserrat',sans-serif;font-size:15px;line-height:1.8;color:#1a2830;border-left:4px solid #00c4bc;padding:13px 18px;background:rgba(0,196,188,.03);border-radius:0 5px 5px 0;font-weight:500;}

/* Investimento - Caixa Escura */
.ib{background:#1a2830;border-radius:8px;padding:36px 40px;text-align:center;border:2px solid #2d4048;position:relative;}
.ib-val{font-family:'Montserrat',sans-serif;font-size:52px;font-weight:800;color:#ffffff;line-height:1;margin:8px 0;letter-spacing:-.02em;}
.ib-label{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.12em;font-weight:700;}
.ib-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:10px;}

/* Parceiros Centralizados */
.par{display:flex;justify-content:center;align-items:center;gap:30px;padding:20px;flex-wrap:wrap;border:1.5px solid rgba(0,196,188,.15);border-radius:8px;background:#ffffff;}
.pa{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;}
.pa img{max-height:35px;width:auto;filter:grayscale(100%);opacity:0.6;transition:all 0.3s;}
.pa:hover img{filter:grayscale(0%);opacity:1;}
.pa-d{font-size:9px;color:#8a9ea8;margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}

/* Admin Footer */
.admin-zone{margin-top:40px;padding:20px;text-align:center;border-top:1px solid #eee;}
.admin-btn{font-size:9px;color:#8a9ea8;text-transform:uppercase;letter-spacing:1px;cursor:pointer;padding:5px 10px;border-radius:4px;transition:all 0.2s;}
.admin-btn:hover{color:#00c4bc;background:rgba(0,196,188,0.05);}

/* Utilitários do OnePage */
.logo-onepage{display:block;margin:0 auto 30px;max-height:60px;width:auto;}

/* Estilos herdados e ajustados */
.pav{background:rgba(0,196,188,.12);color:#00c4bc;font-weight:800;}
.be{color:#00c4bc;border-color:rgba(0,196,188,.3);background:rgba(0,196,188,.08);}
.chip.on{border-color:#00c4bc;background:rgba(0,196,188,.08);color:#00c4bc;}
.obj-chip.on{border-color:#00c4bc;background:rgba(0,196,188,.08);color:#00c4bc;}
.mbt.on{border-color:#00c4bc;background:rgba(0,196,188,.08);color:#00c4bc;}
.tc.hi{background:#00c4bc;border-color:#00c4bc;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// Logotipos Oficiais
const LOGOS = {
    escalar: 'https://novosite.grupoescalar.com/wp-content/uploads/2025/07/ESCALAR-NOVO-LOGO-28-scaled.webp',
    salesforce: 'https://www.salesforce.com/news/wp-content/uploads/sites/3/2021/05/Salesforce-Logo.png',
    g4scale: 'https://mir-s3-cdn-cf.behance.net/project_modules/fs/770267104128527.5f5bd7c3666f4.png'
};

// Dados e Lógica (Preservando a lógica original do usuário)
var proposals = JSON.parse(localStorage.getItem('escalar_proposals') || '[]');
var view = 'dash';
var step = 1;
var editId = null;
var F = {};
var isAdmin = false;

// Configurações Originais
const SEGS = ['Tecnologia & SaaS','Serviços B2B & Consultoria','Indústria & Manufatura','Energia & Sustentabilidade','Logística & Transporte','Jurídico & Contábil','Saúde & Bem-estar'];
const OBJ_OPTS = ['Gerar leads qualificados','Aumentar previsibilidade','Estruturar pré-vendas','Escalar volume de reuniões','Reduzir CAC','Validar novo mercado'];
const VENDEDORES = {
    andre:{n:'André Albergaria',c:'Sócio Diretor',e:'andre@grupoescalar.com'},
    marco:{n:'Marco Tulio',c:'Gerente Comercial',e:'marco@grupoescalar.com'},
    rhavi:{n:'Rhavi',c:'Consultor Comercial',e:'rhavi@grupoescalar.com'}
};
const CLIENTS = {
    'Tecnologia & SaaS': ['Senior','Totvs','Omie','RD Station','Pipefy'],
    'Serviços B2B & Consultoria': ['PWC','EY','Deloitte','KPMG','Accenture']
};

function save(){ localStorage.setItem('escalar_proposals', JSON.stringify(proposals)); }

function fmtVal(v){ 
    if(!v) return 'R$ 0';
    return 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
}

function calcDiag(p){
    // Lógica de diagnóstico original preservada
    return {
        resumo: "Com base no cenário de " + (p.empresa || 'cliente') + ", identificamos uma oportunidade clara de escala através da estruturação de um motor de prospecção outbound dedicado.",
        f: ["Presença digital estabelecida", "ICP bem mapeado"],
        ch: ["Baixa previsibilidade de pipeline", "Dependência de indicações"]
    };
}

// Renderização
function render(){
    var app = document.getElementById('app');
    if(view==='dash') app.innerHTML = rDash();
    else if(view==='form') app.innerHTML = rForm();
    else if(view==='op') app.innerHTML = rOP();
}

function rDash(){
    var cards = proposals.map(p => `
        <div class="pcard">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div class="pname">${p.empresa || 'Sem Nome'}</div>
                    <div class="pmeta">${p.segmento || 'Sem Segmento'} • ${p.valor || 'R$ 0'}</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="sbtn" onclick="goOP('${p.id}')">OnePage</button>
                    <button class="nbtn" onclick="goEdit('${p.id}')">Editar</button>
                    ${isAdmin ? `<button class="dbtn" onclick="delP('${p.id}')">Excluir</button>` : ''}
                </div>
            </div>
        </div>
    `).join('') || '<div style="text-align:center; padding:40px; color:#aaa;">Nenhuma proposta encontrada.</div>';

    return `
        <div class="nav">
            <div class="nlogo"><span>ESCALAR</span> BPO</div>
            <button class="nbtn" onclick="goNew()">+ Nova Proposta</button>
        </div>
        <div class="main">
            <div class="stats">
                <div class="stat"><div class="sv">${proposals.length}</div><div class="sl">Total</div></div>
                <div class="stat"><div class="sv" style="color:#8a9ea8">0</div><div class="sl">Rascunhos</div></div>
                <div class="stat"><div class="sv">0</div><div class="sl">Enviadas</div></div>
                <div class="stat"><div class="sv" style="color:#16a34a">0</div><div class="sl">Aprovadas</div></div>
                <div class="stat"><div class="sv" style="color:#dc2626">0</div><div class="sl">Perdidas</div></div>
            </div>
            ${cards}
            <div class="admin-zone">
                <span class="admin-btn" onclick="toggleAdmin()">Painel ADM</span>
                ${isAdmin ? `<span class="admin-btn" style="color:#dc2626" onclick="clearAll()">Limpar Base</span>` : ''}
            </div>
        </div>
    `;
}

function rForm(){
    var body = '';
    if(step===1){
        body = `
            <div class="lbl">Bloco 01</div>
            <h2 style="margin-bottom:20px;">Identificação do cliente</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                <div><label class="lbl">Empresa</label><input value="${F.empresa||''}" oninput="F.empresa=this.value"></div>
                <div><label class="lbl">Website</label><input value="${F.website||''}" oninput="F.website=this.value"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                <div><label class="lbl">Segmento</label>
                    <select onchange="F.segmento=this.value">
                        <option>Selecione...</option>
                        ${SEGS.map(s=>`<option ${F.segmento===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </div>
                <div><label class="lbl">Contato</label><input value="${F.contato||''}" oninput="F.contato=this.value"></div>
            </div>
        `;
    } else if(step===2){
        body = `
            <div class="lbl">Bloco 02</div>
            <h2 style="margin-bottom:20px;">Contexto comercial</h2>
            <div style="margin-bottom:15px;">
                <label class="lbl">Objetivo com a Escalar</label>
                <textarea rows="4" oninput="F.objetivo=this.value">${F.objetivo||''}</textarea>
            </div>
            <div style="margin-bottom:15px;">
                <label class="lbl">Ticket Médio</label>
                <input value="${F.ticket||''}" oninput="F.ticket=this.value" placeholder="R$ 5.000">
            </div>
        `;
    } else {
        body = `
            <div class="lbl">Bloco 03</div>
            <h2 style="margin-bottom:20px;">Investimento e Modelo</h2>
            <div style="margin-bottom:15px;">
                <label class="lbl">Valor Mensal</label>
                <input value="${F.valor||''}" oninput="F.valor=this.value" style="font-size:20px; font-weight:800; color:#00c4bc;">
            </div>
            <div style="margin-bottom:15px;">
                <label class="lbl">Modelo Operacional</label>
                <select onchange="F.modelo=this.value">
                    <option value="compartilhado" ${F.modelo==='compartilhado'?'selected':''}>BDR Compartilhado</option>
                    <option value="dedicado" ${F.modelo==='dedicado'?'selected':''}>BDR Dedicado</option>
                </select>
            </div>
        `;
    }

    return `
        <div class="nav">
            <div class="nlogo"><span>ESCALAR</span> BPO</div>
            <button class="sbtn" onclick="goDash()">Dashboard</button>
        </div>
        <div style="height:4px; background:#eee;"><div class="pf" style="width:${(step/3)*100}%"></div></div>
        <div class="main" style="max-width:600px;">
            <div class="fcard">
                <div style="padding:30px;">
                    ${body}
                    <div style="display:flex; justify-content:space-between; margin-top:30px;">
                        <button class="sbtn" onclick="${step===1?'goDash()':'step--;render()'}">${step===1?'Cancelar':'Anterior'}</button>
                        <button class="nbtn" onclick="${step<3?'step++;render()':'saveP()'}">${step===3?'Gerar OnePage':'Próximo'}</button>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function rOP(){
    var p = proposals.find(x => x.id === editId);
    var d = calcDiag(p);
    return `
        <div class="nav">
            <div class="nlogo"><span>ESCALAR</span> BPO</div>
            <div style="display:flex; gap:10px;">
                <button class="sbtn" onclick="window.print()">Baixar PDF</button>
                <button class="nbtn" onclick="goDash()">Dashboard</button>
            </div>
        </div>
        <div class="main">
            <div class="op">
                <div style="padding:40px;">
                    <img src="${LOGOS.escalar}" class="logo-onepage" alt="Escalar">
                    
                    <h1 style="text-align:center; font-weight:800; margin-bottom:10px;">PROPOSTA COMERCIAL</h1>
                    <p style="text-align:center; color:#8a9ea8; margin-bottom:40px;">Preparada para: <strong>${p.empresa}</strong></p>

                    <div style="margin-bottom:40px;">
                        <div class="lbl" style="color:#00c4bc; margin-bottom:10px;">Diagnóstico Estratégico</div>
                        <div class="res">${d.resumo}</div>
                    </div>

                    <div class="ib">
                        <div class="ib-label">INVESTIMENTO MENSAL</div>
                        <div class="ib-val">${p.valor || 'Sob consulta'}</div>
                        <div class="ib-sub">Modelo: ${p.modelo==='dedicado'?'BDR Dedicado':'BDR Compartilhado'}</div>
                    </div>

                    <div style="margin-top:60px;">
                        <div class="lbl" style="text-align:center; margin-bottom:20px;">Parceiros Estratégicos</div>
                        <div class="par">
                            <div class="pa"><img src="${LOGOS.salesforce}"><div class="pa-d">CRM Partner</div></div>
                            <div class="pa"><img src="${LOGOS.g4scale}"><div class="pa-d">Scale Member</div></div>
                            <div class="pa"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Pipedrive_logo.svg/2560px-Pipedrive_logo.svg.png" style="height:20px;"><div class="pa-d">Preferred</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

// Navegação e Ações
function goDash(){ view='dash'; render(); }
function goNew(){ F={}; step=1; view='form'; editId='p_'+Date.now(); render(); }
function goEdit(id){ 
    var p = proposals.find(x=>x.id===id);
    F = {...p}; step=1; view='form'; editId=id; render(); 
}
function goOP(id){ editId=id; view='op'; render(); }
function saveP(){
    var idx = proposals.findIndex(x=>x.id===editId);
    if(idx>-1) proposals[idx] = {...F, id:editId};
    else proposals.push({...F, id:editId});
    save();
    view='op';
    render();
}
function delP(id){ if(confirm('Excluir proposta?')){ proposals=proposals.filter(x=>x.id!==id); save(); render(); } }
function toggleAdmin(){ isAdmin=!isAdmin; render(); }
function clearAll(){ if(confirm('Limpar tudo?')){ proposals=[]; save(); render(); } }

render();
</script>
</body>
</html>
